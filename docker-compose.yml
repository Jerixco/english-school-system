services:
  postgres:
    image: postgres:16-alpine
    container_name: english-school-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: english_school
      POSTGRES_PASSWORD: english_school_dev
      POSTGRES_DB: english_school
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
